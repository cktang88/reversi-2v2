<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cross-capture Reversi</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>Cross-capture Reversi</h1>
          <p id="roomLabel"></p>
        </div>
        <div class="actions">
          <button id="rulesButton" class="iconButton" type="button" aria-label="Show rules">?</button>
          <button id="copyLink" type="button">Copy link</button>
          <select id="variantSelect" aria-label="Reset ruleset">
            <option value="standard">Standard</option>
            <option value="experimental">Experimental</option>
          </select>
          <button id="resetGame" type="button">Reset</button>
        </div>
      </section>

      <section class="layout">
        <aside class="panel">
          <form id="joinForm" class="join">
            <label>
              Username
              <input id="username" name="username" maxlength="24" autocomplete="nickname" required />
            </label>
            <div class="teamPicker" role="group" aria-label="Pick a team">
              <button type="button" class="teamChoice warm selected" data-team="warm" aria-label="Join red and orange team">
                <span class="teamSwatches" aria-hidden="true">
                  <span class="dot" data-color="red"></span>
                  <span class="dot" data-color="orange"></span>
                </span>
              </button>
              <button type="button" class="teamChoice cool" data-team="cool" aria-label="Join blue and cyan team">
                <span class="teamSwatches" aria-hidden="true">
                  <span class="dot" data-color="blue"></span>
                  <span class="dot" data-color="cyan"></span>
                </span>
              </button>
            </div>
            <button type="submit" class="joinButton">Join room</button>
          </form>
          <button id="leaveSeat" class="leaveButton" type="button" hidden>Leave seat</button>

          <div class="status">
            <div id="connection">Connecting...</div>
            <div id="message"></div>
          </div>

          <div class="scorePanel">
            <div class="scoreRow" aria-label="Warm team score">
              <span class="teamSwatches" aria-hidden="true">
                <span class="dot" data-color="red"></span>
                <span class="dot" data-color="orange"></span>
              </span>
              <strong id="warmScore">0</strong>
            </div>
            <div class="scoreRow" aria-label="Cool team score">
              <span class="teamSwatches" aria-hidden="true">
                <span class="dot" data-color="blue"></span>
                <span class="dot" data-color="cyan"></span>
              </span>
              <strong id="coolScore">0</strong>
            </div>
          </div>

          <div class="sectionLabel rosterLabel">Players</div>
          <div class="players" id="players"></div>
        </aside>

        <section class="boardWrap">
          <div id="board" class="board" aria-label="Game board"></div>
        </section>
      </section>
      <dialog id="rulesDialog" class="rulesDialog">
        <form method="dialog">
          <button class="closeButton" type="submit" aria-label="Close rules">×</button>
        </form>
        <div id="rulesContent"></div>
      </dialog>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
